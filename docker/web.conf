# Static SPA server for the tradeLiv web app (replaces the Next.js Node server).
# The top-level reverse proxy (nginx.conf / nginx.prod.conf) forwards `/` here and
# `/api` straight to the API, so this only serves static files.
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Prerendered public pages (e.g. /about/index.html) are served directly when
    # present; every other route falls back to the SPA shell so client-side
    # routing (incl. deep links like /projects/:id) works on refresh.
    location / {
        try_files $uri $uri/ /200.html;
    }
}
