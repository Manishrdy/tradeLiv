# ─── HTTP → HTTPS redirect + ACME challenge ──────────────────────────────────
server {
    listen 80;
    server_name tradeliv.design www.tradeliv.design;

    # Let's Encrypt renewal (certbot webroot mode)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name tradeliv.design www.tradeliv.design;

    # ── TLS (Let's Encrypt) ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tradeliv.design/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradeliv.design/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            strict-origin-when-cross-origin       always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 20M;

    # ── SSE endpoint — keep-alive, no buffering ───────────────────────────────
    location /api/events {
        proxy_pass         http://api:4000/api/events;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Frontend (Next.js) ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
