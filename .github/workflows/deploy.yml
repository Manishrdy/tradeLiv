name: CI/CD — Build & Deploy to OCI (PM2)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Reconstruct the prod .env file from the single PROD_ENV secret.
      # next.config.ts auto-loads it for NEXT_PUBLIC_* bake-in, and tests
      # read DEV_DATABASE_URL from it.
      - name: Write .env from PROD_ENV secret
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          printf '%s' "$PROD_ENV" > .env
          chmod 600 .env
          echo "Wrote .env — $(wc -l < .env) lines, $(wc -c < .env) bytes"
          echo "Keys present: $(grep -cE '^[A-Z_]+=' .env)"

      - name: Run API tests
        run: npm run test --workspace=apps/api
        env:
          NODE_ENV: test
          USE_DB: dev

  # ─── 2. Build artifacts on GitHub runner (not on the 1 GB OCI VM) ───────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Reconstruct .env so next.config.ts loads NEXT_PUBLIC_* at build time.
      - name: Write .env from PROD_ENV secret
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          printf '%s' "$PROD_ENV" > .env
          chmod 600 .env
          echo "Wrote .env — $(wc -l < .env) lines, $(wc -c < .env) bytes"
          echo "Keys present: $(grep -cE '^[A-Z_]+=' .env)"

      - name: Build packages (db, emails) + API + Web
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          retention-days: 3
          if-no-files-found: error
          # node_modules is NOT included here — prod deps are installed fresh
          # in the deploy job (on the runner, not the VM) and rsynced over.
          # This keeps the artifact small while avoiding OOM on the 1 GB VM.
          # .env is included so the VM gets runtime secrets from the single
          # PROD_ENV GitHub Secret — no separate .env management on the VM.
          # include-hidden-files is required because actions/upload-artifact
          # skips dotfiles by default.
          include-hidden-files: true
          path: |
            .env
            ecosystem.config.js
            package.json
            package-lock.json
            apps/api/package.json
            apps/api/dist/
            apps/web/package.json
            apps/web/next.config.ts
            apps/web/public/
            apps/web/.next/
            !apps/web/.next/cache
            packages/db/package.json
            packages/db/prisma/
            packages/db/dist/
            packages/db/scripts/
            packages/emails/package.json
            packages/emails/dist/
            packages/types/package.json
            packages/types/src/

  # ─── 3. Deploy: install deps + migrate on runner, rsync to VM, reload PM2 ───
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: release/

      # Install prod deps on the GitHub runner (7 GB RAM) so the OCI VM (1 GB)
      # never has to run npm ci or @prisma/engines postinstall.
      # Both runner and VM are linux/amd64 Ubuntu — native modules are compatible.
      # npm cache keyed on package-lock.json means subsequent deploys are fast.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: release/package-lock.json

      - name: Install production dependencies
        run: cd release && npm ci --omit=dev --no-audit --no-fund

      - name: Run database migrations
        run: |
          cd release
          NODE_OPTIONS='--max-old-space-size=512' USE_DB=prod bash packages/db/scripts/prisma.sh migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync build + node_modules to OCI VM
        # --delete keeps the remote in sync (removes stale chunks and old packages).
        # node_modules is now included — built on runner, rsynced to VM.
        # --exclude protects runtime state on the VM (logs, uploaded files,
        # database backups). .env IS shipped — PROD_ENV GitHub Secret is the
        # single source of truth for env vars.
        run: |
          rsync -az --delete \
            --exclude='logs/' \
            --exclude='uploads/' \
            --exclude='backups/' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes" \
            release/ \
            ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:~/tradeLiv/

      # VM only needs to replace PM2 process definitions from the shipped
      # ecosystem file after rsync. Start one app at a time on the 1 GB VM so
      # startup spikes do not overlap and trigger the OOM killer.
      # All heavy work (npm ci, migrations) already done on the runner above.
      - name: Stop apps, rsync lands, restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd ~/tradeLiv

            echo "==> Flushing PM2 logs to prevent daemon bloat..."
            pm2 flush || true

            echo "==> Memory before startup:"
            free -h

            echo "==> Ensuring swap is available on the 1 GB VM..."
            if ! swapon --show=NAME | grep -q '^/swapfile$'; then
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            echo "==> Memory after swap check:"
            free -h

            echo "==> Stopping PM2 processes..."
            pm2 stop tradeliv-api tradeliv-web || true

            dump_diagnostics() {
              echo "==> Deploy failed — memory, PM2 status, OOM evidence, and recent logs:"
              free -h || true
              sudo dmesg -T | grep -i -E "killed process|out of memory|oom" | tail -30 || true
              pm2 status || true
              for file in \
                "$HOME/.pm2/pm2.log" \
                "$HOME/.pm2/logs/tradeliv-api-out-0.log" \
                "$HOME/.pm2/logs/tradeliv-api-error-0.log" \
                "$HOME/.pm2/logs/tradeliv-web-out-1.log" \
                "$HOME/.pm2/logs/tradeliv-web-error-1.log"; do
                echo "==> $file"
                tail -80 "$file" 2>/dev/null || true
              done
            }

            require_online() {
              app="$1"
              status="$(pm2 describe "$app" 2>/dev/null | awk -F'│' '/ status / {gsub(/ /, "", $3); print $3; exit}')"
              if [ "$status" != "online" ]; then
                echo "$app is ${status:-missing}"
                return 1
              fi
            }

            trap dump_diagnostics ERR

            echo "==> Replacing PM2 process definitions from ecosystem.config.js..."
            pm2 delete tradeliv-api tradeliv-web || true

            echo "==> Starting API..."
            pm2 start ecosystem.config.js --only tradeliv-api --update-env
            sleep 5
            require_online tradeliv-api

            echo "==> Starting web..."
            pm2 start ecosystem.config.js --only tradeliv-web --update-env
            sleep 10
            require_online tradeliv-web

            pm2 save

            trap - ERR

            echo "==> Current PM2 status:"
            pm2 status

            echo "==> Deploy complete."
