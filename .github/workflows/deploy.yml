name: CI/CD — Deploy to OCI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  API_IMAGE: ${{ secrets.OCIR_REGISTRY }}/tradeliv-api
  WEB_IMAGE: ${{ secrets.OCIR_REGISTRY }}/tradeliv-web

jobs:
  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test --workspace=apps/api
        env:
          NODE_ENV: test
          USE_DB: dev
          DEV_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET: test-secret-for-ci-only-32-chars!!
          JWT_EXPIRES_IN: 7d
          FRONTEND_URL: http://localhost:3000

  # ─── 2. Build & Push images ─────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    # Only build on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      # QEMU lets the x86 GitHub runner build ARM64 images for the OCI A1.Flex VM
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          # Format: <tenancy-namespace>/oracleidentitycloudservice/<username>
          username: ${{ secrets.OCIR_USERNAME }}
          # OCI auth token (not account password) — generated in OCI Console
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          # Build for both ARM64 (OCI A1.Flex VM) and AMD64 (local dev/fallback)
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          # NEXT_PUBLIC_* must be baked in at build time
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ─── 3. Deploy to OCI VM ───────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    environment: production      # requires manual approval gate if configured

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd /opt/tradeliv

            echo "==> Authenticating with OCIR..."
            echo "${{ secrets.OCIR_TOKEN }}" | docker login "${{ secrets.OCIR_REGISTRY }}" \
              -u "${{ secrets.OCIR_USERNAME }}" --password-stdin

            echo "==> Pulling new images (tag: ${{ github.sha }})..."
            IMAGE_TAG="${{ github.sha }}" \
            OCIR_REGISTRY="${{ secrets.OCIR_REGISTRY }}" \
            docker compose -f docker-compose.prod.yml pull api web

            echo "==> Pre-deploy database backup..."
            docker compose -f docker-compose.prod.yml exec -T api \
              node dist/scripts/pre-migrate-backup.js 2>/dev/null || \
              echo "Backup skipped (container not yet running)"

            echo "==> Rolling restart (api + web)..."
            IMAGE_TAG="${{ github.sha }}" \
            OCIR_REGISTRY="${{ secrets.OCIR_REGISTRY }}" \
            docker compose -f docker-compose.prod.yml up -d \
              --no-deps --remove-orphans api web

            echo "==> Pruning old images..."
            docker image prune -f

            echo "==> Deploy complete."
