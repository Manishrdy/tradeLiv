name: CI/CD — Build & Deploy to OCI (PM2)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test --workspace=apps/api
        env:
          NODE_ENV: test
          USE_DB: dev
          DEV_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET: test-secret-for-ci-only-32-chars!!
          JWT_EXPIRES_IN: 7d
          FRONTEND_URL: http://localhost:3000

  # ─── 2. Build artifacts on GitHub runner (not on the 1 GB OCI VM) ───────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (db, emails) + API + Web
        # NEXT_PUBLIC_* must be present at web build time — Next.js bakes them into chunks
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NODE_ENV: production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          retention-days: 3
          if-no-files-found: error
          # Only ship what the server needs to run — keep the artifact small.
          # node_modules is NOT included; the VM installs its own (native deps
          # like sharp/bcryptjs must match the VM's architecture, which may
          # differ from GitHub's x64 runner).
          path: |
            package.json
            package-lock.json
            apps/api/package.json
            apps/api/dist/
            apps/web/package.json
            apps/web/next.config.ts
            apps/web/public/
            apps/web/.next/
            !apps/web/.next/cache
            packages/db/package.json
            packages/db/prisma/
            packages/db/dist/
            packages/db/scripts/
            packages/emails/package.json
            packages/emails/dist/
            packages/types/package.json
            packages/types/src/

  # ─── 3. Deploy: rsync artifacts to OCI VM + reload PM2 ──────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: release/

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync artifacts to OCI VM
        # --delete keeps the remote in sync (removes stale chunks so old
        # page-*.js files that no longer reference the current HTML are purged).
        # --exclude protects runtime state on the VM (logs, uploaded files, env).
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='logs/' \
            --exclude='uploads/' \
            --exclude='backups/' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes" \
            release/ \
            ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:~/tradeLiv/

      - name: Install prod deps, run migrations, reload PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd ~/tradeLiv

            echo "==> Installing production dependencies (native bindings compiled for VM arch)..."
            npm ci --omit=dev --no-audit --no-fund

            echo "==> Generating Prisma client..."
            npx prisma generate --schema=packages/db/prisma/schema.prisma

            echo "==> Applying database migrations..."
            npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

            echo "==> Reloading PM2 (zero-downtime)..."
            pm2 reload tradeliv-api tradeliv-web --update-env
            pm2 save

            echo "==> Current PM2 status:"
            pm2 status

            echo "==> Deploy complete."
